name: Update GitHub Statistics

on:
schedule:
- cron: "0 2 * * *"

workflow_dispatch:

permissions:
contents: write

jobs:
generate-statistics:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout profile repository
    uses: actions/checkout@v6

  - name: Generate GitHub statistics card
    uses: stats-organization/github-readme-stats-action@v2
    with:
      card: stats
      options: username=${{ github.repository_owner }}&show_icons=true&hide_border=true&include_all_commits=true&theme=transparent
      path: profile/stats.svg
      token: ${{ secrets.GITHUB_TOKEN }}

  - name: Generate top languages card
    uses: stats-organization/github-readme-stats-action@v2
    with:
      card: top-langs
      options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&hide_border=true&theme=transparent
      path: profile/top-langs.svg
      token: ${{ secrets.GITHUB_TOKEN }}

  - name: Commit updated statistics
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      git add profile/stats.svg profile/top-langs.svg
      git commit -m "Update GitHub profile statistics" || exit 0
      git push
```
